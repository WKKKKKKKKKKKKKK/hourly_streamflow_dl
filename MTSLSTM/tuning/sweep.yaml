program: /home/kongw0a/MTS_LSTM/experiment_withcursor/MTSLSTM/Train.py
method: grid
metric:
  name: val/median_nse
  goal: maximize
parameters:
  lr_schedule:
    values:
    - 1:5e-4,10:1e-4,25:5e-5
    - 1:1e-3,10:5e-4,25:1e-4
  dropout:
    values:
    - 0.4
    - 0.6
  hidden_size:
    values:
    - 64
    - 128
    - 256
  batch_size:
    values:
    - 128
    - 256
  lookback_hourly:
    values:
    - 72
    - 168
    - 336
  lookback_daily:
    values:
    - 365
  epochs:
    values:
    - 100
  patience:
    values:
    - 10
command:
- ${env}
- python
- ${program}
- --wandb
- --wandb-project=MTSLSTM_Streamflow
- --wandb-run-name=MTSLSTM_sweep
- --wandb-mode=online
- --output-dir=runs/${envvar:RUN_DATE}/MTSLSTM/${envvar:WANDB_RUN_ID}
- --loss=nse_loss
- --reg-lambda=1.0
- --early-stopping
- ${args}
